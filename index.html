<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Statistical Methods in Health Economics Papers</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Statistical methods used in health economics papers</h1>
      </div>
    </header>

    <nav class="paper-tabs" id="paperTabs" aria-label="Choose paper"></nav>

    <main>
      <div class="paper-layout">
        <!-- Left: paper overview -->
        <article class="paper-summary">
          <div class="paper-kicker" id="paperKicker"></div>
          <h2 id="paperTitle"></h2>
          <p class="paper-citation" id="paperCitation"></p>
          <p class="paper-takeaway" id="paperTakeaway"></p>
          <div class="lens-grid" id="lensGrid"></div>
        </article>

        <!-- Right: statistical methods deep-dive -->
        <aside class="method-panel" id="methodPanel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Statistical methods</p>
              <h3 id="methodPanelTitle">Select a method to explore</h3>
            </div>
            <a id="paperLink" href="#" target="_blank" rel="noreferrer">Source →</a>
          </div>
          <div class="method-nav" id="methodNav" aria-label="Method list"></div>
          <div class="method-detail" id="methodDetail"></div>
        </aside>
      </div>

      <!-- Bottom: key results & pitfalls -->
      <section class="evidence-band" aria-label="Results and pitfalls">
        <div>
          <p class="eyebrow">Key quantitative results</p>
          <div class="signal-chart" id="signalChart"></div>
        </div>
        <div>
          <p class="eyebrow">Methodological pitfalls</p>
          <div class="pitfall-list" id="pitfallList"></div>
        </div>
      </section>
    </main>

    <footer>
      <p>Public dashboard includes summaries, metadata, and publisher links only. Journal PDFs are not redistributed.</p>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="app.js"></script>
  </body>
</html>
